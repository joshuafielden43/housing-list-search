name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      HLS_DISABLE_MARKER_PDF: "1"  # optional OCR dep; see requirements-ocr.txt

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Ruff lint
        run: ruff check .

      - name: Dependency audit (pip-audit)
        run: |
          pip install pip-audit
          pip-audit
          pip-audit -r requirements-ocr.txt

      - name: Validate imports (dry-run doctor)
        run: python scripts/doctor.py --dry-run

      - name: Run unit tests (integration tests excluded)
        run: python -m pytest tests/ -m "not integration" -q --tb=short