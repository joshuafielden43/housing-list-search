# Human-validated record-count bounds for live portal checks.
# Last reviewed: 2026-07-10 (#662 — expanded beyond original 4 endpoints).
#
# Run: pytest tests/test_ground_truth.py -m integration
# Also runs weekly in .github/workflows/integration-weekly.yml
#
# Filters (optional env):
#   HLS_GT_MODE=all     — every case (default; weekly CI)
#   HLS_GT_MODE=core    — fast core set only (Bloom/PDF/MTC/HouseKeys sample)
#   HLS_GT_MODE=rotate  — core + half of expand, alternating by ISO week
#   HLS_GT_NAMES=a,b    — explicit case name list (overrides mode)
#
# tier: core = longstanding weekly; expand = adapter-family coverage added #662
# family: adapter/platform label for docs (not used by routing)

targets:
  # --- core (original weekly smoke) ---
  - name: san_jose_bloom
    family: bloom
    tier: core
    method: extract_target
    authority: City of San José
    url: https://housing.sanjoseca.gov/listings
    min_records: 50
    max_records: 120

  - name: gilroy_pdf
    family: pdf
    tier: core
    method: extract_target
    authority: City of Gilroy
    url: https://www.cityofgilroy.org/DocumentCenter/View/16518
    min_records: 3
    max_records: 40

  - name: santa_clara_mtc
    family: bloom
    tier: core
    method: extract_target
    authority: City of Santa Clara
    url: https://housingbayarea.mtc.ca.gov/listings
    min_records: 1
    max_records: 20

  - name: morgan_hill_housekeys
    family: housekeys
    tier: core
    method: scrape_target
    min_records: 1
    max_records: 1
    target:
      authority: City of Morgan Hill
      url: https://www.morganhill.ca.gov/629/Housing
      scraping_measures: housekeys
      notes: ""
      administrator: HouseKeys
      administrator_url: https://www.housekeys1.com/
      administrator_phone: ""
      administrator_contact: ""

